# LegalBench-RAG sweep (run after acquiring corpus via src/cli/download_legalbenchrag.py)
dataset: configs/datasets/legalbenchrag.yaml
pricing: configs/pricing/default.yaml
outputs: {out_dir: outputs/legalbenchrag}

generation:
  enabled: false

grid:
  retrieval.type: [bm25, dense, hybrid]
  retrieval.top_k: [5, 8, 12]
  chunking.chunk_size: [150, 250]
  chunking.overlap: [30]
  rerank.enabled: [false, true]
